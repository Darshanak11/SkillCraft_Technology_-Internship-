<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stopwatch</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #ffffff;
    --bg2:         #f6f5fb;
    --bg3:         #eeedf8;
    --text:        #1a1818;
    --text2:       #6b6878;
    --text3:       #a09daf;
    --border:      rgba(100,90,180,.13);
    --border2:     rgba(100,90,180,.25);
    --v400:        #7F77DD;
    --v600:        #534AB7;
    --v800:        #3C3489;
    --b400:        #378ADD;
    --b600:        #185FA5;
    --b800:        #0C447C;
    --radius-md:   10px;
    --radius-lg:   14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #13121e;
      --bg2:    #1c1b2e;
      --bg3:    #232240;
      --text:   #edeaf8;
      --text2:  #9b97b8;
      --text3:  #5e5b78;
      --border: rgba(140,130,255,.12);
      --border2:rgba(140,130,255,.24);
    }
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.25rem 5rem;
  }

  .sw {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .sw-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.75rem;
  }

  .sw-title {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .sw-pill {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 4px 13px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
    color: var(--text3);
    transition: all .25s;
  }

  .sw-pill.running {
    background: rgba(127,119,221,.14);
    border-color: var(--v400);
    color: var(--v600);
  }

  .sw-pill.paused {
    background: rgba(55,138,221,.11);
    border-color: var(--b400);
    color: var(--b600);
  }

  /* ── Ring ── */
  .sw-ring-wrap {
    position: relative;
    width: 270px;
    height: 270px;
    margin: 0 auto 1.875rem;
  }

  .sw-ring-wrap svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .track {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }

  .prog {
    fill: none;
    stroke-linecap: round;
    stroke-dasharray: 785;
    stroke-dashoffset: 785;
    transition: stroke-dashoffset .08s linear;
  }

  .prog-outer {
    stroke: var(--v400);
    stroke-width: 11;
    opacity: .25;
  }

  .prog-inner {
    stroke: var(--v600);
    stroke-width: 4;
  }

  .sw-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity .5s;
    box-shadow: 0 0 70px 16px rgba(127,119,221,.2);
  }

  .sw-glow.on { opacity: 1; }

  .sw-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .sw-digits {
    font-family: 'Share Tech Mono', monospace;
    font-size: 54px;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--text);
    user-select: none;
  }

  .sw-cs {
    font-family: 'Share Tech Mono', monospace;
    font-size: 27px;
    color: var(--text2);
    margin-top: 3px;
    user-select: none;
  }

  .sw-lap-live {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 8px;
  }

  .sw-lap-live-lbl {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .sw-lap-live-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    color: var(--v400);
    margin-top: 2px;
  }

  /* ── Stats ── */
  .sw-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 8px;
    margin-bottom: 1.125rem;
  }

  .sw-stat {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: .75rem 1rem;
  }

  .sw-stat-lbl {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 5px;
  }

  .sw-stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .sw-stat-val.violet { color: var(--v400); }
  .sw-stat-val.blue   { color: var(--b400); }

  /* ── Buttons ── */
  .sw-btns {
    display: grid;
    grid-template-columns: 1fr 1.85fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .sw-btn {
    border-radius: var(--radius-lg);
    background: var(--bg);
    border: 0.5px solid var(--border2);
    color: var(--text2);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background .15s, transform .1s;
  }

  .sw-btn:hover { background: var(--bg2); }
  .sw-btn:active { transform: scale(.95); }

  .sw-btn-main {
    height: 58px;
    border: none;
    color: #fff;
    font-size: 15px;
    background: linear-gradient(135deg, var(--v400), var(--v600));
  }

  .sw-btn-main:hover {
    opacity: .88;
    background: linear-gradient(135deg, var(--v400), var(--v600));
  }

  .sw-btn-main.is-paused {
    background: linear-gradient(135deg, var(--b400), var(--b600));
  }

  .sw-btn-main.is-paused:hover {
    background: linear-gradient(135deg, var(--b400), var(--b600));
  }

  /* ── Lap list ── */
  hr.div {
    border: none;
    border-top: 0.5px solid var(--border);
    margin-bottom: 1rem;
  }

  .sw-laps-hd {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .625rem;
  }

  .sw-laps-hd-l {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .sw-laps-hd-r {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .sw-laps {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    max-height: 230px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .sw-lap {
    display: grid;
    grid-template-columns: 28px 1fr 1fr 46px;
    gap: 6px;
    align-items: center;
    padding: 9px 14px;
    border-bottom: 0.5px solid var(--border);
    animation: lap-in .2s ease;
  }

  .sw-lap:last-child { border-bottom: none; }
  .sw-lap:hover { background: var(--bg2); }

  @keyframes lap-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lap-n { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text3); }
  .lap-t { font-family:'Share Tech Mono',monospace; font-size:14px; font-weight:500; color:var(--text); }
  .lap-d { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--text2); text-align:right; }

  .lap-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    text-align: center;
    letter-spacing: .04em;
  }

  .best-b  { background: rgba(127,119,221,.15); color: var(--v800); }
  .slow-b  { background: rgba(55,138,221,.12);  color: var(--b800); }

  @media (prefers-color-scheme: dark) {
    .best-b { color: #AFA9EC; }
    .slow-b { color: #85B7EB; }
  }

  .sw-empty {
    padding: 2.25rem 1rem;
    text-align: center;
    font-size: 13px;
    color: var(--text3);
  }
</style>
</head>
<body>
<div class="sw">

  <div class="sw-header">
    <span class="sw-title">Stopwatch</span>
    <span class="sw-pill" id="state-pill">Idle</span>
  </div>

  <div class="sw-ring-wrap">
    <div class="sw-glow" id="glow"></div>
    <svg viewBox="0 0 270 270" aria-hidden="true">
      <circle class="track" cx="135" cy="135" r="125"/>
      <circle class="prog prog-outer" cx="135" cy="135" r="125" id="ring-o"/>
      <circle class="prog prog-inner" cx="135" cy="135" r="125" id="ring-i"/>
    </svg>
    <div class="sw-center">
      <div class="sw-digits" id="t-main">00:00</div>
      <div class="sw-cs"     id="t-cs">.00</div>
      <div class="sw-lap-live">
        <span class="sw-lap-live-lbl">lap</span>
        <span class="sw-lap-live-val" id="cur-lap">—</span>
      </div>
    </div>
  </div>

  <div class="sw-stats">
    <div class="sw-stat">
      <div class="sw-stat-lbl">Laps</div>
      <div class="sw-stat-val violet" id="s-count">0</div>
    </div>
    <div class="sw-stat">
      <div class="sw-stat-lbl">Best</div>
      <div class="sw-stat-val violet" id="s-best">—</div>
    </div>
    <div class="sw-stat">
      <div class="sw-stat-lbl">Avg</div>
      <div class="sw-stat-val blue" id="s-avg">—</div>
    </div>
  </div>

  <div class="sw-btns">
    <button class="sw-btn" id="btn-lap" aria-label="Record lap">
      <i class="ti ti-flag" aria-hidden="true" style="font-size:15px"></i> Lap
    </button>
    <button class="sw-btn sw-btn-main" id="btn-start" aria-label="Start">
      <i class="ti ti-player-play" id="play-icon" aria-hidden="true" style="font-size:18px"></i>
      <span id="btn-lbl">Start</span>
    </button>
    <button class="sw-btn" id="btn-reset" aria-label="Reset">
      <i class="ti ti-refresh" aria-hidden="true" style="font-size:15px"></i> Reset
    </button>
  </div>

  <hr class="div">

  <div class="sw-laps-hd">
    <span class="sw-laps-hd-l">Lap times</span>
    <span class="sw-laps-hd-r" id="lap-meta"></span>
  </div>

  <div class="sw-laps" id="lap-list">
    <div class="sw-empty">No laps recorded yet</div>
  </div>

</div>

<script>
  let elapsed=0, startTime=0, lapStart=0, running=false, raf=null, laps=[];

  const C = 2 * Math.PI * 125;

  const tMain    = document.getElementById('t-main');
  const tCs      = document.getElementById('t-cs');
  const curLap   = document.getElementById('cur-lap');
  const pill     = document.getElementById('state-pill');
  const glow     = document.getElementById('glow');
  const ringO    = document.getElementById('ring-o');
  const ringI    = document.getElementById('ring-i');
  const sCount   = document.getElementById('s-count');
  const sBest    = document.getElementById('s-best');
  const sAvg     = document.getElementById('s-avg');
  const btnStart = document.getElementById('btn-start');
  const playIcon = document.getElementById('play-icon');
  const btnLbl   = document.getElementById('btn-lbl');
  const lapList  = document.getElementById('lap-list');
  const lapMeta  = document.getElementById('lap-meta');

  ringO.style.strokeDasharray = ringI.style.strokeDasharray = C;
  ringO.style.strokeDashoffset = ringI.style.strokeDashoffset = C;

  function p2(n) { return String(n).padStart(2,'0'); }
  function fmt(ms) { const s=Math.floor(ms/1000); return p2(Math.floor(s/60))+':'+p2(s%60); }
  function fmtF(ms) { const s=Math.floor(ms/1000); return p2(Math.floor(s/60))+':'+p2(s%60)+'.'+p2(Math.floor((ms%1000)/10)); }

  function setRing(ms) {
    const off = C * (1 - (ms % 60000) / 60000);
    ringO.style.strokeDashoffset = off;
    ringI.style.strokeDashoffset = off;
  }

  function render() {
    tMain.textContent = fmt(elapsed);
    tCs.textContent   = '.' + p2(Math.floor((elapsed % 1000) / 10));
    setRing(elapsed);
    curLap.textContent = elapsed > 0 ? fmtF(elapsed - lapStart) : '—';
  }

  function tick() { elapsed = Date.now() - startTime; render(); raf = requestAnimationFrame(tick); }

  function setUI(state) {
    pill.className = 'sw-pill' + (state==='running' ? ' running' : state==='paused' ? ' paused' : '');
    pill.textContent = state==='running' ? 'Running' : state==='paused' ? 'Paused' : 'Idle';
    glow.className = 'sw-glow' + (state==='running' ? ' on' : '');
    playIcon.className = 'ti ' + (state==='running' ? 'ti-player-pause' : 'ti-player-play');
    btnLbl.textContent = state==='running' ? 'Pause' : state==='paused' ? 'Resume' : 'Start';
    btnStart.className = 'sw-btn sw-btn-main' + (state==='paused' ? ' is-paused' : '');
  }

  function start()  { startTime = Date.now() - elapsed; running = true;  setUI('running'); raf = requestAnimationFrame(tick); }
  function pause()  { cancelAnimationFrame(raf); running = false; setUI('paused'); }

  function reset() {
    cancelAnimationFrame(raf);
    elapsed = 0; lapStart = 0; laps = []; running = false;
    render(); setUI('idle');
    sCount.textContent = '0';
    sBest.textContent = '—';
    sAvg.textContent  = '—';
    lapMeta.textContent = '';
    lapList.innerHTML = '<div class="sw-empty">No laps recorded yet</div>';
  }

  function recordLap() {
    if (elapsed === 0) return;
    const t = elapsed - lapStart;
    laps.push(t); lapStart = elapsed;
    const best = Math.min(...laps);
    const avg  = Math.round(laps.reduce((a,b) => a+b, 0) / laps.length);
    sCount.textContent = laps.length;
    sBest.textContent  = fmtF(best);
    sAvg.textContent   = fmtF(avg);
    if (laps.length > 1) lapMeta.textContent = 'slowest ' + fmtF(Math.max(...laps));
    renderLaps();
  }

  function renderLaps() {
    const best  = Math.min(...laps);
    const worst = Math.max(...laps);
    lapList.innerHTML = '';
    for (let i = laps.length - 1; i >= 0; i--) {
      const t = laps[i];
      const isBest  = laps.length > 2 && t === best;
      const isWorst = laps.length > 2 && t === worst;
      const delta   = i > 0 ? t - laps[i-1] : null;
      const dStr    = delta != null ? (delta >= 0 ? '+' : '−') + fmtF(Math.abs(delta)) : '';
      const badge   = isBest  ? '<span class="lap-badge best-b">best</span>'
                    : isWorst ? '<span class="lap-badge slow-b">slow</span>'
                    : '<span></span>';
      const row = document.createElement('div');
      row.className = 'sw-lap';
      row.innerHTML = `<span class="lap-n">${p2(i+1)}</span><span class="lap-t">${fmtF(t)}</span><span class="lap-d">${dStr}</span>${badge}`;
      lapList.appendChild(row);
    }
  }

  btnStart.addEventListener('click', () => running ? pause() : start());
  document.getElementById('btn-lap').addEventListener('click', recordLap);
  document.getElementById('btn-reset').addEventListener('click', reset);
  render();
</script>
</body>
</html>
